<div class="d-flex nav-container">
  <div class="search-container">
    <i class="bi bi-search"></i>
    <input type="text" class="form-control" [placeholder]="literals?.usa_map?.search_placeholder"
      [(ngModel)]="searchTerm" (input)="filterStates()">
  </div>
  <div class="ms-auto d-flex align-items-center gap-2 me-2">
    <div class="theme-toggle-wrap">
      <label class="switch" for="app-theme-switch">
        <input id="app-theme-switch" type="checkbox" class="circle" [checked]="!themeService.isDark()"
          (change)="themeService.setDark(!$any($event.target).checked)" />
        <svg viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg" class="moon svg" aria-hidden="true">
          <path
            d="M223.5 32C100 32 0 132.3 0 256S100 480 223.5 480c60.6 0 115.5-24.2 155.8-63.4c5-4.9 6.3-12.5 3.1-18.7s-10.1-9.7-17-8.5c-9.8 1.7-19.8 2.6-30.1 2.6c-96.9 0-175.5-78.8-175.5-176c0-65.8 36-123.1 89.3-153.3c6.1-3.5 9.2-10.5 7.7-17.3s-7.3-11.9-14.3-12.5c-6.3-.5-12.6-.8-19-.8z">
          </path>
        </svg>
        <div class="sun svg">
          <span class="dot"></span>
        </div>
      </label>
    </div>
    <select #langSelect class="form-select lang-select" style="width: auto; cursor: pointer;" [(ngModel)]="currentLang"
      (change)="changeLanguage(currentLang); langSelect.blur()" (blur)="langSelect.blur()">
      <option value="es">ES</option>
      <option value="en">US</option>
    </select>
  </div>
</div>

<div class="position-relative">

  <div *ngIf="filteredStateList.length > 0" class="filtered-list-container position-absolute">
    <div *ngFor="let state of filteredStateList">
      <p (click)="selectState(state, !state.selected)">{{ state.name }}</p>
    </div>
  </div>

  <div
    class="polygon-tools-stack position-absolute bottom-position"
    [class.ms-2]="!mobileLayout"
  >
    <div *ngIf="mobileLayout && mobileSheetClosed" class="mobile-open-list-row">
      <span class="tool-tooltip-wrap" [matTooltip]="literals?.usa_map?.open_states_list" matTooltipPosition="above">
        <button type="button" (click)="openMobileStatesPanel()" class="btn feature-buttons feature-buttons-mobile-open-list">
          <i class="bi bi-chevron-right"></i>
        </button>
      </span>
    </div>
    <div class="polygon-buttons">
    <span class="tool-tooltip-wrap" [matTooltip]="literals?.usa_map?.draw_polygon" matTooltipPosition="above">
      <button type="button" (click)="activateDrawPolygon()" class="btn feature-buttons"
        [ngClass]="{ 'btn-selected': drawPolygon !== null }">
        <i class="bi bi-hexagon"></i>
      </button>
    </span>
    <span class="tool-tooltip-wrap" [matTooltip]="literals?.usa_map?.edit_vertices" matTooltipPosition="above">
      <button type="button" (click)="activateModifyTool()" class="btn feature-buttons"
        [ngClass]="{ 'btn-selected': modifyInteraction !== null }" [disabled]="!hasDrwanPolygons()">
        <i class="bi bi-arrows-angle-contract"></i>
      </button>
    </span>
    <span class="tool-tooltip-wrap" [matTooltip]="literals?.usa_map?.move_polygon" matTooltipPosition="above">
      <button type="button" (click)="activateTranformTool()" class="btn feature-buttons"
        [ngClass]="{ 'btn-selected': translateInteraction !== null }" [disabled]="!hasDrwanPolygons()">
        <i class="bi bi-arrows-move"></i>
      </button>
    </span>
    <span class="tool-tooltip-wrap" [matTooltip]="literals?.usa_map?.split_polygon" matTooltipPosition="above">
      <button type="button" (click)="activateDrawLine()" class="btn feature-buttons"
        [ngClass]="{ 'btn-selected': drawLine !== null }" [disabled]="!hasDrwanPolygons()">
        <i class="bi bi-slash-lg"></i>
      </button>
    </span>
    <span class="tool-tooltip-wrap" [matTooltip]="literals?.usa_map?.cut_polygon" matTooltipPosition="above">
      <button type="button" (click)="intersectPolygons()" class="btn feature-buttons"
        [ngClass]="{ 'btn-selected': drawPolygonCut !== null }" [disabled]="!hasDrwanPolygons()">
        <i class="bi bi-scissors"></i>
      </button>
    </span>
    <span class="tool-tooltip-wrap" [matTooltip]="literals?.usa_map?.add_area" matTooltipPosition="above">
      <button type="button" (click)="unionPolygons()" class="btn feature-buttons"
        [ngClass]="{ 'btn-selected': drawPolygonUnion !== null }" [disabled]="!hasDrwanPolygons()">
        <i class="bi bi-intersect"></i>
      </button>
    </span>
    <span class="tool-tooltip-wrap" [matTooltip]="literals?.usa_map?.extract_area" matTooltipPosition="above">
      <button type="button" (click)="intersectContainPolygon()" class="btn feature-buttons"
        [ngClass]="{ 'btn-selected': drawPolygonContainCut !== null }" [disabled]="!hasDrwanPolygons()">
        <i class="bi bi-box-arrow-in-down"></i>
      </button>
    </span>
    <span *ngIf="!mobileLayout" class="tool-tooltip-wrap" [matTooltip]="literals?.usa_map?.add_geojson" matTooltipPosition="above">
      <button type="button" (click)="setDragAndDropInteraction()" class="btn feature-buttons"
        [ngClass]="{ 'btn-selected': dragAndDropInteraction !== null }">
        <i class="bi bi-file-earmark-plus"></i>
      </button>
    </span>

    </div>
  </div>

  <div class="modeView-buttons position-absolute bottom-position end-0 me-1">
    <span class="tool-tooltip-wrap" [matTooltip]="literals?.usa_map?.list_states" matTooltipPosition="left">
      <button (click)="onListStatesOrOpenSheet()" class="btn feature-buttons">
        <i class="bi bi-list-ol"></i>
      </button>
    </span>
    <span class="tool-tooltip-wrap" [matTooltip]="literals?.usa_map?.manage_layers" matTooltipPosition="left">
      <button (click)="changeViewMode(viewMode.LAYERS)" class="btn feature-buttons">
        <i class="bi bi-layers"></i>
      </button>
    </span>
  </div>

  <div class="polygon-buttons position-absolute top-position" *ngIf="selectedPolygon && !comparedStates">
    <span class="tool-tooltip-wrap" [matTooltip]="literals?.usa_map?.delete_polygon" matTooltipPosition="left">
      <button (click)="removeSelectFeature()" class="btn feature-buttons feature-buttons-danger">
        <i class="bi bi-trash"></i>
      </button>
    </span>

    <span class="tool-tooltip-wrap" [matTooltip]="literals?.states_list?.compare_states_tooltip" matTooltipPosition="left">
      <button (click)="openComparedComponent()" class="btn feature-buttons feature-buttons-info">
        <i class="bi bi-grid-3x3-gap"></i>
      </button>
    </span>

    <span class="tool-tooltip-wrap" [matTooltip]="literals?.usa_map?.polygon_info" matTooltipPosition="left">
      <button
        (click)="changeViewMode(viewMode.POLYGON_AREA)"
        class="btn feature-buttons feature-buttons-info"
        [disabled]="currentViewMode === viewMode.POLYGON_AREA"
      >
        <i class="bi bi-info-circle"></i>
      </button>
    </span>
  </div>

  <div id="map" class="map" [style.width]="'100%'" [style.height]="mobileLayout ? '100%' : '100vh'">
    <div id="tooltip" class="tooltip" style="display: none;"></div>
  </div>

</div>

<div *ngIf="comparedStates" class="modal-overlay">
  <app-state-compared [states]="statesToCompare" (close)="closeModal()"></app-state-compared>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsts/2.6.1/jsts.js"></script>


<div *ngIf="dragAndDropInteraction !== null" class="drag-drop-dialog">
  <div class="dialog-content">
    <p>{{ literals?.usa_map?.drag_drop_geojson }}</p>
  </div>
</div>
